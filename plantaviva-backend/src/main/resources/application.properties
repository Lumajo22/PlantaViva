# ════════════════════════════════════════════════════════════════════
#   PlantaViva — Configuración del Backend Spring Boot
#   Archivo: application.properties
#   Stack:   Spring Boot 4.0 / Java 25 / PostgreSQL 15+
# ════════════════════════════════════════════════════════════════════

# ─── Identificación de la aplicación ────────────────────────────────
spring.application.name=plantaviva-backend
server.port=8080

# ─── Conexión a PostgreSQL ──────────────────────────────────────────
# Si tu Postgres usa otro puerto, cámbialo aquí (default es 5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/plantaviva
spring.datasource.username=postgres
spring.datasource.password=8623041
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# ─── JPA / Hibernate ────────────────────────────────────────────────
# IMPORTANTE: usamos 'validate' porque las tablas ya existen en PG
# Cambia a 'update' si quieres que JPA modifique la BD automáticamente.
# NUNCA uses 'create' o 'create-drop' en producción (borra los datos).
spring.jpa.hibernate.ddl-auto=validate

# Dialecto PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mostrar SQL en consola (útil en desarrollo, desactívalo en producción)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración para mapear LocalDate / LocalDateTime correctamente
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# ─── Jackson (serialización JSON) ───────────────────────────────────
spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── SpringDoc OpenAPI / Swagger UI ─────────────────────────────────
# Acceso: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ────────────────────────────────────────────────────────
logging.level.com.plantaviva=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ─── Internacionalización (i18n) — preparado para Paso 7 ────────────
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
# ─── OAuth2 Google ──────────────────────────────────────────────────
spring.profiles.include=oauth

# ════════════════════════════════════════════════════════════════════
#   PlantaViva — GitHub Actions CI/CD Pipeline
#   Se ejecuta en cada push a main/master
# ════════════════════════════════════════════════════════════════════

name: PlantaViva CI/CD

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ─── Backend: Compilar y ejecutar tests ────────────────────────
  backend-tests:
    name: Backend - Maven Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: 🔨 Build with Maven
        run: |
          cd plantaviva-backend
          mvn clean install -DskipTests
      
      - name: 🧪 Run JUnit Tests
        run: |
          cd plantaviva-backend
          mvn test
      
      - name: 📊 Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: plantaviva-backend/target/surefire-reports/*.xml
          reporter: java-junit

  # ─── Frontend: Compilar con npm ────────────────────────────────
  frontend-build:
    name: Frontend - npm Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plantaviva-frontend/package-lock.json
      
      - name: 📚 Install dependencies
        run: |
          cd plantaviva-frontend
          npm ci
      
      - name: 🔨 Build frontend
        run: |
          cd plantaviva-frontend
          npm run build
      
      - name: ✅ Build successful
        run: echo "Frontend build completed successfully!"

  # ─── Docker: Verificar que docker-compose funciona ─────────────
  docker-check:
    name: Docker - Validate compose
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Validate docker-compose
        run: docker-compose config
      
      - name: ✅ Docker validation successful
        run: echo "Docker compose file is valid!"